<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="goldMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="48%" stop-color="#f2df88"/>
      <stop offset="100%" stop-color="#b8922a"/>
    </linearGradient>
    <linearGradient id="goldShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a3f14"/>
      <stop offset="100%" stop-color="#7a5520"/>
    </linearGradient>
    <linearGradient id="diamondStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#f2df88"/>
      <stop offset="100%" stop-color="#b8922a"/>
    </linearGradient>
  </defs>

  <!-- Diamond outline -->
  <polygon
    points="100,13 187,100 100,187 13,100"
    stroke="url(#diamondStroke)"
    stroke-width="3.5"
    fill="none"
    stroke-linejoin="miter"
  />

  <!-- P monogram — shadow layer (3-D depth effect) -->
  <g
    stroke="url(#goldShadow)"
    stroke-width="12"
    stroke-linecap="square"
    stroke-linejoin="miter"
    fill="none"
    transform="translate(4.5,4.5)"
  >
    <!-- Vertical bar -->
    <line x1="76" y1="68" x2="76" y2="133"/>
    <!-- Bowl: top → right side → back -->
    <polyline points="76,68 122,68 122,102 76,102"/>
  </g>

  <!-- P monogram — main gold layer -->
  <g
    stroke="url(#goldMain)"
    stroke-width="12"
    stroke-linecap="square"
    stroke-linejoin="miter"
    fill="none"
  >
    <!-- Vertical bar -->
    <line x1="76" y1="68" x2="76" y2="133"/>
    <!-- Bowl: top → right side → back -->
    <polyline points="76,68 122,68 122,102 76,102"/>
  </g>
</svg>
